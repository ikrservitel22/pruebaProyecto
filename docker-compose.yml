version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: dockerfile

    container_name: laravel_appV2

    working_dir: /var/www

    volumes:
      - ./:/var/www
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini

    depends_on:
      - db

    networks:
      - red_ia

  web:
    image: nginx:latest

    container_name: laravel_web

    ports:
      - "8003:80"

    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - red_ia

  db:
    image: mysql:8.0

    container_name: laravel_db

    restart: always

    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - pruv_volumen:/var/lib/mysql

    ports:
      - "3306:3306"

    networks:
      - red_ia

volumes:
  pruv_volumen:

networks:
  red_ia:
    external: true